<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>☠️ Rebel IPTV Player</title>
<script src="https://cdn.jsdelivr.net/npm/mpegts.js@1.7.3/dist/mpegts.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--surface:#141420;--border:#2a2a3a;--accent:#6c5ce7;--accent2:#a29bfe;--text:#e0e0e0;--muted:#666;--red:#e74c3c}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
.header{background:var(--surface);padding:8px 12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);flex-shrink:0}
.header h1{font-size:16px;color:var(--accent2)}
.header .spacer{flex:1}
.btn{background:var(--accent);color:#fff;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600}
.btn:hover{background:var(--accent2)}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-red{background:var(--red)}
.search-wrap{padding:8px 12px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.search-wrap input{width:100%;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;outline:none}
.search-wrap input:focus{border-color:var(--accent)}
.main{display:flex;flex:1;overflow:hidden}
.channels{width:320px;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0}
.channel-item{padding:10px 12px;border-bottom:1px solid var(--border);cursor:pointer;display:flex;align-items:center;gap:10px}
.channel-item:hover{background:rgba(108,92,231,.15)}
.channel-item.active{background:rgba(108,92,231,.25);border-left:3px solid var(--accent)}
.channel-logo{width:36px;height:36px;border-radius:6px;object-fit:contain;background:#000;flex-shrink:0}
.channel-info{flex:1;min-width:0}
.channel-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.channel-group{font-size:11px;color:var(--muted);margin-top:2px}
.player-area{flex:1;display:flex;flex-direction:column;background:#000;position:relative}
#video{width:100%;height:100%;background:#000}
.player-controls{position:absolute;bottom:0;left:0;right:0;padding:12px;background:linear-gradient(transparent,rgba(0,0,0,.8));display:flex;align-items:center;gap:10px;opacity:0;transition:.3s}
.player-area:hover .player-controls{opacity:1}
.player-controls .now-playing{font-size:13px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player-controls button{background:rgba(255,255,255,.15);border:none;color:#fff;padding:6px 10px;border-radius:6px;cursor:pointer;font-size:12px}
.empty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted);font-size:14px;flex-direction:column;gap:8px;text-align:center;padding:20px}
.empty .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
.empty .error{color:var(--red);font-size:13px}
.empty .help{font-size:12px;color:var(--muted);line-height:1.6}
@keyframes spin{to{transform:rotate(360deg)}}
.groups{padding:6px 12px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;gap:6px;overflow-x:auto;flex-shrink:0}
.group-tag{padding:4px 10px;border-radius:12px;font-size:11px;cursor:pointer;background:var(--bg);border:1px solid var(--border);color:var(--muted);white-space:nowrap}
.group-tag:hover,.group-tag.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:100}
.modal-overlay.show{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;width:90%;max-width:500px;max-height:90vh;overflow-y:auto}
.modal h2{font-size:18px;margin-bottom:16px;color:var(--accent2)}
.modal label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px;margin-top:10px}
.modal input,.modal textarea{width:100%;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;outline:none;resize:vertical}
.modal textarea{min-height:60px;font-family:monospace}
.modal input:focus,.modal textarea:focus{border-color:var(--accent)}
.modal .actions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
.tabs{display:flex;gap:4px;margin-bottom:12px}
.tab{padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer;background:var(--bg);border:1px solid var(--border);color:var(--muted)}
.tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.toast{position:fixed;top:12px;right:12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 16px;font-size:13px;z-index:200;opacity:0;transition:.3s;pointer-events:none}
.toast.show{opacity:1}
@media(max-width:600px){.main{flex-direction:column}.channels{width:100%;height:45%;border-right:none;border-bottom:1px solid var(--border)}.player-area{height:55%}}
</style>
</head>
<body>
<div class="header">
  <h1>☠️ Rebel IPTV</h1>
  <div class="spacer"></div>
  <button class="btn btn-ghost" onclick="openConfig()">⚙️ Config</button>
  <button class="btn" onclick="loadPlaylist()">📡 Carregar</button>
</div>
<div class="search-wrap"><input type="text" id="search" placeholder="🔍 Pesquisar canal..." oninput="filterChannels()"></div>
<div class="groups" id="groups"><div class="group-tag active" onclick="filterGroup('all',this)">Todos</div></div>
<div class="main">
  <div class="channels" id="channels">
    <div class="empty"><p>📋 Configura o teu servidor IPTV para começar</p><p class="help">Clica em ⚙️ Config para adicionar Xtream Codes ou URL M3U</p></div>
  </div>
  <div class="player-area" id="playerArea">
    <video id="video" controls playsinline webkit-playsinline></video>
    <div class="player-controls">
      <span class="now-playing" id="nowPlaying">Nenhum canal seleccionado</span>
      <button onclick="toggleFullscreen()">⛶ Ecrã inteiro</button>
    </div>
  </div>
</div>
<div class="modal-overlay" id="configModal">
  <div class="modal">
    <h2>⚙️ Configuração</h2>
    <div class="tabs">
      <div class="tab active" onclick="switchTab('xtream',this)">Xtream Codes</div>
      <div class="tab" onclick="switchTab('m3u',this)">M3U / URL</div>
    </div>
    <div id="xtreamTab">
      <label>Host (ex: http://servidor:8080)</label>
      <input type="text" id="xtreamHost" placeholder="http://servidor:8080">
      <label>Username</label>
      <input type="text" id="xtreamUser" placeholder="username">
      <label>Password</label>
      <input type="password" id="xtreamPass" placeholder="password">
    </div>
    <div id="m3uTab" style="display:none">
      <label>URL da lista M3U / M3U8</label>
      <textarea id="m3uUrl" placeholder="http://servidor/get.php?username=USER&amp;password=PASS&amp;type=m3u_plus"></textarea>
      <label style="margin-top:12px;font-size:11px;color:var(--muted)">💡 Dica: Se o URL não funcionar directamente, o player tenta proxies automáticamente</label>
    </div>
    <div class="actions">
      <button class="btn btn-ghost" onclick="closeConfig()">Cancelar</button>
      <button class="btn" onclick="saveConfig()">💾 Guardar & Carregar</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const video=document.getElementById('video');
const channelsEl=document.getElementById('channels');
const groupsEl=document.getElementById('groups');
const searchEl=document.getElementById('search');
const nowPlaying=document.getElementById('nowPlaying');
const toastEl=document.getElementById('toast');
let allChannels=[],currentGroup='all',currentMode='',currentPlayer=null;
let currentChannel=null,reconnectCount=0,MAX_RECONNECT=5;
let reconnectTimer=null,bufferCheckTimer=null;

function showToast(msg){toastEl.textContent=msg;toastEl.classList.add('show');setTimeout(()=>toastEl.classList.remove('show'),3000)}

function switchTab(tab,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('xtreamTab').style.display=tab==='xtream'?'block':'none';
  document.getElementById('m3uTab').style.display=tab==='m3u'?'block':'none';
}

// === CARREGAR PLAYLIST ===
function loadPlaylist(){
  const mode=localStorage.getItem('iptv_mode');
  if(!mode){openConfig();return}
  if(mode==='xtream'){
    const host=localStorage.getItem('xtream_host');
    const user=localStorage.getItem('xtream_user');
    const pass=localStorage.getItem('xtream_pass');
    if(!host||!user||!pass){openConfig();return}
    loadXtream(host,user,pass);
  }else{
    const url=localStorage.getItem('m3u_url');
    if(!url){openConfig();return}
    loadM3U(url);
  }
}

// === LOAD XTREAM CODES ===
async function loadXtream(host,user,pass){
  channelsEl.innerHTML='<div class="empty"><div class="spinner"></div><span>A carregar canais...</span></div>';
  groupsEl.innerHTML='<div class="group-tag active" onclick="filterGroup(\'all\',this)">Todos</div>';
  allChannels=[];
  currentMode='xtream';
  const apiBase=host.replace(/\/$/,'');

  try{
    let catMap={};
    try{
      const catResp=await fetch(apiBase+'/player_api.php?username='+encodeURIComponent(user)+'&password='+encodeURIComponent(pass)+'&action=get_live_categories',{
        referrerPolicy:'no-referrer',
        signal:AbortSignal.timeout(15000)
      });
      if(catResp.ok){
        const cats=await catResp.json();
        if(Array.isArray(cats)) cats.forEach(c=>{catMap[c.category_id]=c.category_name||c.name;});
      }
    }catch(e){console.warn('[IPTV] Categories fetch failed:',e.message);}

    const chResp=await fetch(apiBase+'/player_api.php?username='+encodeURIComponent(user)+'&password='+encodeURIComponent(pass)+'&action=get_live_streams',{
      referrerPolicy:'no-referrer',
      signal:AbortSignal.timeout(30000)
    });
    if(!chResp.ok) throw new Error('Servidor respondeu HTTP '+chResp.status);
    const channels=await chResp.json();
    if(!Array.isArray(channels)||!channels.length){
      channelsEl.innerHTML='<div class="empty"><span>❌ Nenhum canal encontrado</span><br><button class="btn" style="margin-top:12px" onclick="openConfig()">Reconfigurar</button></div>';
      return;
    }

    allChannels=channels.map(ch=>({
      name:ch.name||'Canal '+ch.stream_id,
      logo:ch.stream_icon||'',
      group:catMap[ch.category_id]||'Geral',
      url:apiBase+'/live/'+encodeURIComponent(user)+'/'+encodeURIComponent(pass)+'/'+ch.stream_id+'.m3u8',
      streamId:ch.stream_id
    }));

    buildGroups();
    renderChannels(allChannels);
    showToast('✅ '+allChannels.length+' canais carregados');
  }catch(err){
    console.error('[IPTV] Xtream error:',err);
    channelsEl.innerHTML='<div class="empty"><span class="error">❌ Erro: '+err.message+'</span><br><p class="help">Verifica se o host, username e password estão correctos.<br>O servidor pode estar offline ou bloquear browsers.</p><button class="btn" style="margin-top:12px" onclick="openConfig()">Tentar novamente</button></div>';
  }
}

// === LOAD M3U ===
async function loadM3U(url){
  channelsEl.innerHTML='<div class="empty"><div class="spinner"></div><span>A carregar lista...</span></div>';
  groupsEl.innerHTML='<div class="group-tag active" onclick="filterGroup(\'all\',this)">Todos</div>';
  allChannels=[];
  currentMode='m3u';
  let loaded=false;
  let m3uText='';

  try{
    channelsEl.innerHTML='<div class="empty"><div class="spinner"></div><span>Tentativa 1/3: ligação directa...</span></div>';
    const resp=await fetch(url,{referrerPolicy:'no-referrer',signal:AbortSignal.timeout(30000)});
    if(resp.ok){
      m3uText=await resp.text();
      if(m3uText.includes('#EXTM3U')||m3uText.includes('#EXTINF')){loaded=true;showToast('📡 Carregado via ligação directa');}
    }
  }catch(e){console.warn('[IPTV] Direct fetch failed:',e.message);}

  if(!loaded){
    try{
      channelsEl.innerHTML='<div class="empty"><div class="spinner"></div><span>Tentativa 2/3: proxy allorigins...</span></div>';
      const r=await fetch('https://api.allorigins.win/raw?url='+encodeURIComponent(url),{signal:AbortSignal.timeout(30000)});
      const text=await r.text();
      if(text.includes('#EXTM3U')||text.includes('#EXTINF')){m3uText=text;loaded=true;showToast('📡 Carregado via proxy allorigins');}
    }catch(e){console.warn('[IPTV] allorigins failed:',e.message);}
  }

  if(!loaded){
    try{
      channelsEl.innerHTML='<div class="empty"><div class="spinner"></div><span>Tentativa 3/3: proxy corsproxy...</span></div>';
      const r=await fetch('https://corsproxy.io/?'+encodeURIComponent(url),{signal:AbortSignal.timeout(30000)});
      const text=await r.text();
      if(text.includes('#EXTM3U')||text.includes('#EXTINF')){m3uText=text;loaded=true;showToast('📡 Carregado via proxy corsproxy');}
    }catch(e){console.warn('[IPTV] corsproxy failed:',e.message);}
  }

  if(!loaded){
    channelsEl.innerHTML='<div class="empty"><span class="error">❌ Não foi possível carregar a lista M3U</span><br><p class="help">O servidor pode estar offline ou bloquear browsers.</p><button class="btn" style="margin-top:12px" onclick="openConfig()">Tentar novamente</button></div>';
    return;
  }

  parseM3U(m3uText);
}

function parseM3U(text){
  const lines=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n');
  let cur={};
  for(let i=0;i<lines.length;i++){
    const line=lines[i].trim();
    if(line.startsWith('#EXTINF:')){
      const lm=line.match(/tvg-logo="([^"]*)"/);
      const logo=lm?lm[1]:'';
      const nm=line.match(/,(.+)$/);
      const name=nm?nm[1].trim():'Canal '+(allChannels.length+1);
      const gm=line.match(/group-title="([^"]*)"/);
      const group=gm?gm[1]:'Sem grupo';
      cur={name,logo,group};
    }else if(line&&!line.startsWith('#')&&cur.name){
      cur.url=line;
      allChannels.push({...cur});
      cur={};
    }
  }
  if(!allChannels.length){channelsEl.innerHTML='<div class="empty"><span>❌ Nenhum canal encontrado na lista</span></div>';return}
  buildGroups();
  renderChannels(allChannels);
  showToast('✅ '+allChannels.length+' canais carregados');
}

function buildGroups(){
  const groups=[...new Set(allChannels.map(c=>c.group))].sort();
  groupsEl.innerHTML='<div class="group-tag active" onclick="filterGroup(\'all\',this)">Todos</div>';
  groups.forEach(g=>{
    const t=document.createElement('div');
    t.className='group-tag';
    t.textContent=g;
    t.onclick=function(){filterGroup(g,this)};
    groupsEl.appendChild(t);
  });
}

function renderChannels(list){
  if(!list.length){channelsEl.innerHTML='<div class="empty"><span>Nenhum canal encontrado</span></div>';return}
  channelsEl.innerHTML='';
  list.forEach(ch=>{
    const div=document.createElement('div');
    div.className='channel-item';
    div.dataset.url=ch.url;
    const logoHtml=ch.logo?'<img class="channel-logo" src="'+ch.logo+'" onerror="this.style.display=\'none\'">':'<div style="width:36px;height:36px;border-radius:6px;background:#1a1a2a;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:#444">TV</div>';
    div.innerHTML=logoHtml+'<div class="channel-info"><div class="channel-name">'+ch.name+'</div><div class="channel-group">'+ch.group+'</div></div>';
    div.onclick=function(){playChannel(ch)};
    channelsEl.appendChild(div);
  });
}

// === STREAM RESOLVER ===
const PROXY_SERVERS=['https://corsproxy.io/?','https://api.allorigins.win/raw?url='];

async function fetchWithTimeout(url,opts,timeout){
  const ctrl=new AbortController();
  const tid=setTimeout(()=>ctrl.abort(),timeout);
  try{const r=await fetch(url,{...opts,signal:ctrl.signal});clearTimeout(tid);return r;}
  catch(e){clearTimeout(tid);throw e;}
}

async function tryProxy(url){
  for(const proxy of PROXY_SERVERS){
    try{
      const r=await fetchWithTimeout(proxy+encodeURIComponent(url),{redirect:'follow'},12000);
      if(r.ok){const ct=(r.headers.get('content-type')||'').toLowerCase();if(!ct.includes('text/html')){return proxy+encodeURIComponent(url);}}
    }catch(e){console.warn('[IPTV] Proxy failed:',proxy,e.message);}
  }
  return null;
}

// === PLAYER ===

function destroyPlayer(){
  stopReconnect();
  if(currentPlayer){
    try{
      if(currentPlayer.destroy) currentPlayer.destroy();
      if(currentPlayer.unload) currentPlayer.unload();
      if(currentPlayer.detachMedia) currentPlayer.detachMedia();
    }catch(e){}
    currentPlayer=null;
  }
  video.removeAttribute('src');
  video.load();
}

function stopReconnect(){
  if(reconnectTimer){clearTimeout(reconnectTimer);reconnectTimer=null;}
  if(bufferCheckTimer){clearInterval(bufferCheckTimer);bufferCheckTimer=null;}
  reconnectCount=0;
}

// Auto-reconnect when stream dies
function setupReconnect(ch){
  stopReconnect();
  currentChannel=ch;
  reconnectCount=0;

  // Monitor video for stalls/timeouts
  let lastTime=0,stallCount=0;
  bufferCheckTimer=setInterval(()=>{
    if(!currentChannel)return;
    if(video.paused||video.ended)return;

    const curTime=video.currentTime;
    if(curTime===lastTime){
      stallCount++;
      if(stallCount>=5){ // 5 seconds no progress
        console.warn('[IPTV] Stream stalled, attempting reconnect...');
        stallCount=0;
        attemptReconnect();
      }
    }else{
      stallCount=0;
      lastTime=curTime;
    }
  },1000);

  // Also listen for error events
  video.onerror=()=>{
    console.warn('[IPTV] Video error, attempting reconnect...');
    attemptReconnect();
  };
}

function attemptReconnect(){
  if(!currentChannel)return;
  if(reconnectCount>=MAX_RECONNECT){
    showToast('❌ Stream perdido. Tenta outro canal.');
    stopReconnect();
    return;
  }
  reconnectCount++;
  showToast('🔄 Reconectando... ('+reconnectCount+'/'+MAX_RECONNECT+')');
  console.log('[IPTV] Reconnect attempt',reconnectCount,'for',currentChannel.name);

  // Small delay before reconnect
  reconnectTimer=setTimeout(()=>{
    if(!currentChannel)return;
    const ch=currentChannel;
    destroyPlayer();
    // Try playing again
    playStream(ch,true);
  },2000);
}

// Try playing HLS with large buffer
function tryPlayHLS(streamUrl){
  return new Promise(resolve=>{
    try{
      if(typeof Hls!=='undefined'&&Hls.isSupported()){
        const hls=new Hls({
          enableWorker:true,
          // Large buffer for stability
          maxBufferLength:60,
          maxMaxBufferLength:120,
          maxBufferSize:60*1000*1000, // 60MB
          // Aggressive retry
          fragLoadingMaxRetry:6,
          manifestLoadingMaxRetry:6,
          levelLoadingMaxRetry:6,
          // Longer timeouts
          startLoadTimeout:15000,
          fragLoadingTimeout:20000,
          manifestLoadingTimeout:20000,
          levelLoadingTimeout:20000,
          // Low latency mode off for stability
          lowLatencyMode:false,
          // Back buffer
          backBufferLength:90
        });
        currentPlayer=hls;
        const timer=setTimeout(()=>{
          console.warn('[IPTV] HLS timeout:',streamUrl);
          try{hls.destroy();}catch(e){}
          currentPlayer=null;
          resolve(false);
        },25000);

        hls.on(Hls.Events.MANIFEST_PARSED,(e,data)=>{
          clearTimeout(timer);
          console.log('[IPTV] HLS OK:',streamUrl,'levels:',data.levels.length);
          showToast('✅ A reproduzir');
          video.play().catch(()=>{});
          resolve(true);
        });

        hls.on(Hls.Events.ERROR,(e,data)=>{
          console.warn('[IPTV] HLS error:',data.type,data.details,'fatal:',data.fatal);
          if(data.fatal){
            clearTimeout(timer);
            try{hls.destroy();}catch(er){}
            currentPlayer=null;
            resolve(false);
          }
          // Non-fatal errors: HLS.js will retry automatically
        });

        hls.loadSource(streamUrl);
        hls.attachMedia(video);
        return;
      }
      // Native HLS (Safari/iOS)
      const vcanPlay=document.createElement('video');
      if(vcanPlay.canPlayType('application/vnd.apple-mpegurl')||vcanPlay.canPlayType('application/x-mpegURL')){
        video.src=streamUrl;
        video.onplaying=()=>{showToast('✅ A reproduzir');resolve(true);};
        video.onerror=()=>resolve(false);
        video.play().catch(()=>{});
        setTimeout(()=>resolve(!!video.src),15000);
        return;
      }
      resolve(false);
    }catch(e){
      console.warn('[IPTV] HLS exception:',e.message);
      resolve(false);
    }
  });
}

// Try playing TS via mpegts.js
function tryPlayTS(streamUrl){
  return new Promise(resolve=>{
    try{
      if(typeof mpegts!=='undefined'&&mpegts.getFeatureList().mseLivePlayback){
        const player=mpegts.createPlayer({
          type:'mse',
          url:streamUrl,
          isLive:true,
          enableStashBuffer:true,
          stashInitialSize:256,
          enableWorker:true,
          lazyLoad:false
        });
        currentPlayer=player;
        const timer=setTimeout(()=>{
          console.warn('[IPTV] TS timeout:',streamUrl);
          try{player.destroy();}catch(e){}
          currentPlayer=null;
          resolve(false);
        },25000);
        player.on(mpegts.Events.MEDIA_INFO,()=>{
          clearTimeout(timer);
          console.log('[IPTV] TS OK:',streamUrl);
          showToast('✅ A reproduzir');
          video.play().catch(()=>{});
          resolve(true);
        });
        player.on(mpegts.Events.ERROR,(e,d)=>{
          clearTimeout(timer);
          try{player.destroy();}catch(er){}
          currentPlayer=null;
          console.warn('[IPTV] TS error:',d);
          resolve(false);
        });
        player.attachMediaElement(video);
        player.load();
        return;
      }
      resolve(false);
    }catch(e){
      console.warn('[IPTV] TS exception:',e.message);
      resolve(false);
    }
  });
}

function playNative(url){
  showToast('▶️ Reprodução nativa...');
  video.src=url;
  video.play().catch(e=>{
    if(e.name==='NotAllowedError') showToast('▶️ Clica no play para iniciar');
  });
}

// === MAIN PLAY FUNCTION ===
async function playChannel(ch){
  if(!ch||!ch.url)return;
  nowPlaying.textContent=ch.name;
  document.querySelectorAll('.channel-item').forEach(el=>el.classList.toggle('active',el.dataset.url===ch.url));
  destroyPlayer();
  setupReconnect(ch);
  await playStream(ch,false);
}

async function playStream(ch,isReconnect){
  const url=ch.url;
  const hasExt=url.match(/\.(m3u8|ts|mp4|avi|mkv|flv)(\?|$)/i);
  const isHLS=url.includes('.m3u8')||url.includes('m3u8');
  const isTS=url.includes('.ts')||url.includes('/play/');
  const hasNoExt=!hasExt&&!isHLS;

  if(!isReconnect) showToast('▶️ A carregar...');

  // Build URL variants
  const variants=[url];
  if(hasNoExt){
    const liveMatch=url.match(/^(.+)\/([^/]+)\/([^/]+)\/([^/]+)$/);
    variants.push(url+'.m3u8');
    variants.push(url+'.ts');
    if(liveMatch){
      const base=liveMatch[1],u=liveMatch[2],p=liveMatch[3],id=liveMatch[4];
      variants.push(base+'/live/'+u+'/'+p+'/'+id+'.m3u8');
      variants.push(base+'/live/'+u+'/'+p+'/'+id+'.ts');
    }
  }

  // Phase 1: HLS direct
  for(const v of variants){
    if(isHLS||v.includes('.m3u8')){
      const ok=await tryPlayHLS(v);
      if(ok) return;
    }
  }

  // Phase 2: TS direct
  for(const v of variants){
    if(isTS||v.includes('.ts')){
      const ok=await tryPlayTS(v);
      if(ok) return;
    }
  }

  // Phase 3: Via proxy
  showToast('🔄 A tentar via proxy...');
  for(const v of variants){
    const proxiedUrl=await tryProxy(v);
    if(proxiedUrl){
      const ok=await tryPlayHLS(proxiedUrl);
      if(ok) return;
      const ok2=await tryPlayTS(proxiedUrl);
      if(ok2) return;
    }
  }

  // Phase 4: Native
  showToast('⚠️ Reprodução nativa...');
  playNative(url);
}

function filterChannels(){
  const q=searchEl.value.toLowerCase();
  const f=allChannels.filter(c=>c.name.toLowerCase().includes(q)&&(currentGroup==='all'||c.group===currentGroup));
  renderChannels(f);
}

function filterGroup(g,el){
  currentGroup=g;
  document.querySelectorAll('.group-tag').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  filterChannels();
}

function toggleFullscreen(){
  const a=document.getElementById('playerArea');
  if(document.fullscreenElement)document.exitFullscreen();else a.requestFullscreen();
}

function openConfig(){
  document.getElementById('xtreamHost').value=localStorage.getItem('xtream_host')||'';
  document.getElementById('xtreamUser').value=localStorage.getItem('xtream_user')||'';
  document.getElementById('xtreamPass').value=localStorage.getItem('xtream_pass')||'';
  document.getElementById('m3uUrl').value=localStorage.getItem('m3u_url')||'';
  document.getElementById('configModal').classList.add('show');
}
function closeConfig(){document.getElementById('configModal').classList.remove('show')}

function saveConfig(){
  const activeTab=document.querySelector('.tab.active');
  if(activeTab.textContent.includes('Xtream')){
    const host=document.getElementById('xtreamHost').value.trim();
    const user=document.getElementById('xtreamUser').value.trim();
    const pass=document.getElementById('xtreamPass').value.trim();
    if(!host||!user||!pass){alert('Preenche todos os campos');return}
    localStorage.setItem('iptv_mode','xtream');
    localStorage.setItem('xtream_host',host);
    localStorage.setItem('xtream_user',user);
    localStorage.setItem('xtream_pass',pass);
    closeConfig();
    loadXtream(host,user,pass);
  }else{
    const url=document.getElementById('m3uUrl').value.trim();
    if(!url){alert('Introduz um URL');return}
    localStorage.setItem('iptv_mode','m3u');
    localStorage.setItem('m3u_url',url);
    closeConfig();
    loadM3U(url);
  }
}

function autoLoad(){
  const params=new URLSearchParams(window.location.search);
  const host=params.get('host');
  const user=params.get('user');
  const pass=params.get('pass');
  const m3u=params.get('m3u');
  if(host&&user&&pass){
    localStorage.setItem('iptv_mode','xtream');
    localStorage.setItem('xtream_host',host);
    localStorage.setItem('xtream_user',user);
    localStorage.setItem('xtream_pass',pass);
    loadXtream(host,user,pass);
  }else if(m3u){
    localStorage.setItem('iptv_mode','m3u');
    localStorage.setItem('m3u_url',m3u);
    loadM3U(m3u);
  }else{
    const mode=localStorage.getItem('iptv_mode');
    if(mode==='xtream'){
      const h=localStorage.getItem('xtream_host');
      const u=localStorage.getItem('xtream_user');
      const p=localStorage.getItem('xtream_pass');
      if(h&&u&&p) loadXtream(h,u,p);
    }else if(mode==='m3u'){
      const url=localStorage.getItem('m3u_url');
      if(url) loadM3U(url);
    }
  }
}

autoLoad();

</script>
